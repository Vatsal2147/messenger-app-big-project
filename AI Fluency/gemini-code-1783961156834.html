<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-lg">
        <h2 class="text-2xl font-semibold text-gray-800 mb-2">Get in Touch</h2>
        <p class="text-sm text-gray-600 mb-6">Have a question or want to work together? Drop us a message.</p>
        
        <form action="#" method="POST" class="flex flex-col gap-5">
            <div class="flex flex-col gap-1.5">
                <label for="name" class="text-sm font-medium text-gray-700">Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-md text-sm bg-gray-50 focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 outline-none transition-all">
            </div>
            
            <div class="flex flex-col gap-1.5">
                <label for="email" class="text-sm font-medium text-gray-700">Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-md text-sm bg-gray-50 focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 outline-none transition-all">
            </div>
            
            <div class="flex flex-col gap-1.5">
                <label for="subject" class="text-sm font-medium text-gray-700">Subject</label>
                <input type="text" id="subject" name="subject" placeholder="How can we help?" required
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-md text-sm bg-gray-50 focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 outline-none transition-all">
            </div>
            
            <div class="flex flex-col gap-1.5">
                <label for="message" class="text-sm font-medium text-gray-700">Message</label>
                <textarea id="message" name
