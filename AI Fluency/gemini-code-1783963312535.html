<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Environmental Science and Engineering</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    /* Prevent canvas background from blocking clicks to the form fields */
    #bg-canvas {
      pointer-events: none;
    }
  </style>
</head>
<body class="m-0 min-h-screen flex justify-center items-center bg-gray-50 p-3 sm:p-5 overflow-x-hidden relative font-sans">

  <canvas id="bg-canvas" class="fixed top-0 left-0 w-screen h-screen z-10" aria-hidden="true"></canvas>

  <main class="relative z-20 bg-white p-6 sm:p-10 rounded-xl shadow-lg w-full max-w-[550px] box-border">
    <h2 class="text-[#14532d] text-2xl sm:text-3xl font-bold mb-2 text-center">
      Contact Environmental Science & Engineering
    </h2>
    <p class="text-gray-600 text-sm sm:text-base mb-6 text-center">
      Have questions about our research or programs? Reach out to us.
    </p>
    
    <div id="success-alert" role="alert" class="hidden bg-green-50 text-green-800 border border-green-200 p-3 rounded-md mb-5 text-sm sm:text-base text-center font-medium">
      Thank you! Your message has been sent successfully.
    </div>

    <form id="contact-form" novalidate class="flex flex-col gap-5">
      
      <div class="flex flex-col gap-1.5">
        <label for="name" class="text-gray-800 text-sm font-semibold">Full Name <span aria-hidden="true" class="text-red-600">*</span></label>
        <input
          type="text"
          id="name"
          name="name"
          aria-required="true"
          class="w-full p-3 text-base border border-gray-300 rounded-md outline-none transition-all duration-200 focus:border-green-600 focus:ring-2 focus:ring-green-100 bg-white"
        />
        <span id="name-error" role="alert" class="hidden text-red-600 text-xs mt-0.5"></span>
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="email" class="text-gray-800 text-sm font-semibold">Email Address <span aria-hidden="true" class="text-red-600">*</span></label>
        <input
          type="email"
          id="email"
          name="email"
          aria-required="true"
          class="w-full p-3 text-base border border-gray-300 rounded-md outline-none transition-all duration-200 focus:border-green-600 focus:ring-2 focus:ring-green-100 bg-white"
        />
        <span id="email-error" role="alert" class="hidden text-red-600 text-xs mt-0.5"></span>
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="subject" class="text-gray-800 text-sm font-semibold">Subject <span aria-hidden="true" class="text-red-600">*</span></label>
        <input
          type="text"
          id="subject"
          name="subject"
          aria-required="true"
          class="w-full p-3 text-base border border-gray-300 rounded-md outline-none transition-all duration-200 focus:border-green-600 focus:ring-2 focus:ring-green-100 bg-white"
        />
        <span id="subject-error" role="alert" class="hidden text-red-600 text-xs mt-0.5"></span>
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="message" class="text-gray-800 text-sm font-semibold">Message <span aria-hidden="true" class="text-red-600">*</span></label>
        <textarea
          id="message"
          name="message"
          rows="5"
          aria-required="true"
          class="w-full p-3 text-base border border-gray-300 rounded-md outline-none transition-all duration-200 focus:border-green-600 focus:ring-2 focus:ring-green-100 bg-white resize-y font-inherit"
        ></textarea>
        <span id="message-error" role="alert" class="hidden text-red-600 text-xs mt-0.5"></span>
      </div>

      <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white p-3.5 text-base font-semibold border-none rounded-md cursor-pointer transition-colors duration-200 mt-2">
        Send Message
      </button>
    </form>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      
      // ==========================================
      // 1. THREE.JS & GSAP ANIMATED BACKGROUND
      // ==========================================
      const canvas = document.getElementById('bg-canvas');
      if (canvas) {
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // Create abstract "eco" green floating particles
        const particlesGeometry = new THREE.BufferGeometry();
        const count = 45;
        const positions = new Float32Array(count * 3);

        for (let i = 0; i < count * 3; i++) {
          positions[i] = (Math.random() - 0.5) * 10;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        // Styling particles with the brand green theme color
        const particlesMaterial = new THREE.PointsMaterial({
          size: 0.18,
          color: 0x16a34a, // Tailwind's green-600
          transparent: true,
          opacity: 0.35
        });

        const particles = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particles);
        camera.position.z = 5;

        // Smooth continuous environment rotation using GSAP
        gsap.to(particles.rotation, {
          x: Math.PI * 2,
          y: Math.PI * 2,
          duration: 50,
          repeat: -1,
          ease: 'none'
        });

        // Fluid responsive resize adjustments
        window.addEventListener('resize', () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Render Loop
        const animate = () => {
          requestAnimationFrame(animate);
          renderer.render(scene, camera);
        };
        animate();
      }

      // ==========================================
      // 2. FORM VALIDATION & ACCESSIBILITY LOGIC
      // ==========================================
      const form = document.getElementById('contact-form');
      const successAlert = document.getElementById('success-alert');

      const fields = {
        name: document.getElementById('name'),
        email: document.getElementById('email'),
        subject: document.getElementById('subject'),
        message: document.getElementById('message')
      };

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      // Sets programmatic accessibility indicators and updates Tailwind classes
      const setError = (fieldKey, message) => {
        const inputEl = fields[fieldKey];
        const errorEl = document.getElementById(`${fieldKey}-error`);
        
        // Visual error state manipulation
        inputEl.classList.add('border-red-600');
        inputEl.classList.remove('border-gray-300');
        
        // Screen reader semantic declarations
        inputEl.setAttribute('aria-invalid', 'true');
        inputEl.setAttribute('aria-describedby', `${fieldKey}-error`);
        
        errorEl.textContent = message;
        errorEl.classList.remove('hidden');
      };

      // Resets input back to its standard clean configuration
      const clearError = (fieldKey) => {
        const inputEl = fields[fieldKey];
        const errorEl = document.getElementById(`${fieldKey}-error`);
        
        inputEl.classList.remove('border-red-600');
        inputEl.classList.add('border-gray-300');
        
        inputEl.removeAttribute('aria-invalid');
        inputEl.removeAttribute('aria-describedby');
        
        errorEl.textContent = '';
        errorEl.classList.add('hidden');
      };

      // Real-time error clearing as the user updates text inputs
      Object.keys(fields).forEach(key => {
        fields[key].addEventListener('input', () => {
          if (fields[key].value.trim() !== '') {
            clearError(key);
          }
        });
      });

      // Submit Interception Routine
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        let hasErrors = false;

        // Name Check
        if (!fields.name.value.trim()) {
          setError('name', 'Name is required.');
          hasErrors = true;
        } else {
          clearError('name');
        }

        // Email Check
        if (!fields.email.value.trim()) {
          setError('email', 'Email is required.');
          hasErrors = true;
        } else if (!emailRegex.test(fields.email.value.trim())) {
          setError('email', 'Please enter a valid email address.');
          hasErrors = true;
        } else {
          clearError('email');
        }

        // Subject Check
        if (!fields.subject.value.trim()) {
          setError('subject', 'Subject is required.');
          hasErrors = true;
        } else {
          clearError('subject');
        }

        // Message Check
        if (!fields.message.value.trim()) {
          setError('message', 'Message is required.');
          hasErrors = true;
        } else {
          clearError('message');
        }

        // Processing upon completely validated inputs
        if (!hasErrors) {
          successAlert.classList.remove('hidden');
          form.reset();
          
          // Focus screen naturally up toward the completion banner
          successAlert.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      });
    });
  </script>
</body>
</html>
